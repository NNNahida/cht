<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消防点位逐项检查打卡</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", system-ui, sans-serif;
        }
        body {
            background-color: #f3f4f6;
            padding: 40px 20px;
            max-width: 720px;
            margin: 0 auto;
        }
        .container {
            background: #ffffff;
            border-radius: 18px;
            padding: 32px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.07);
        }
        h1 {
            text-align: center;
            color: #1f2937;
            font-size: 26px;
            margin-bottom: 26px;
        }
        .stat-wrap {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            background: #eff6ff;
            border-radius: 14px;
            padding: 20px 12px;
            margin-bottom: 30px;
            text-align: center;
        }
        .stat-num {
            font-size: 34px;
            font-weight: 700;
            color: #2563eb;
        }
        .stat-desc {
            font-size: 14px;
            color: #4b5563;
            margin-top: 6px;
        }
        .task-card {
            background: #f9fafb;
            border-radius: 14px;
            padding: 30px 24px;
            min-height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-bottom: 28px;
        }
        .task-label {
            font-size: 15px;
            color: #6b7280;
            margin-bottom: 10px;
        }
        .name-edit-wrap {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 12px;
        }
        #posNameInput {
            flex: 1;
            font-size: 24px;
            font-weight: 600;
            color: #111827;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 8px 12px;
            background: #fff;
        }
        .edit-btn {
            white-space: nowrap;
            padding: 7px 12px;
            border-radius: 8px;
            border: none;
            background: #2563eb;
            color: white;
            cursor: pointer;
        }
        .check-times {
            font-size: 16px;
            color: #2563eb;
            line-height: 1.6;
        }
        .btn-box {
            display: flex;
            gap: 18px;
            transition: flex-direction 0.25s ease;
        }
        .btn-box.swap {
            flex-direction: row-reverse;
        }
        button {
            flex: 1;
            padding: 18px;
            border-radius: 12px;
            border: none;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
        }
        #confirmBtn {
            background-color: #2563eb;
            color: #fff;
        }
        #confirmBtn:disabled {
            background-color: #b4caf1;
            cursor: not-allowed;
        }
        #resetBtn {
            background-color: #e5e7eb;
            color: #374151;
        }
        #resetBtn:disabled {
            background-color: #d1d5db;
            color: #888;
            cursor: not-allowed;
        }
        /* 弹窗样式 */
        .toast {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75);
            color: #fff;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 18px;
            z-index: 9999;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>消防点位逐项检查</h1>
        <div class="stat-wrap">
            <div>
                <div class="stat-num" id="finishCount">0</div>
                <div class="stat-desc">已检查次数</div>
            </div>
            <div>
                <div class="stat-num" id="totalCheckNum">0</div>
                <div class="stat-desc">总共需要次数</div>
            </div>
        </div>

        <div class="task-card">
            <div class="task-label">当前点位（可编辑）</div>
            <div class="name-edit-wrap">
                <input type="text" id="posNameInput">
                <button class="edit-btn" id="saveNameBtn">保存名称</button>
            </div>
            <div class="check-times" id="timesText"></div>
        </div>

        <div class="btn-box" id="btnBox">
            <button id="confirmBtn">本次确认检查</button>
            <button id="resetBtn">重置全部进度</button>
        </div>
    </div>
    <div class="toast" id="toast">点位已打</div>

    <script>
        const rawList = [
            {name:"4楼",times:1},
            {name:"1楼消防栓",times:2},
            {name:"2号门",times:3},
            {name:"喵喵理发消防栓",times:1},
            {name:"3-12",times:1},
            {name:"3-13",times:1},
            {name:"3-14",times:1},
            {name:"3-10",times:1},
            {name:"下一个口子",times:1},
            {name:"万达影城",times:1},
            {name:"3-8",times:1},
            {name:"2号厕所",times:1},
            {name:"3-7内",times:1},
            {name:"dx",times:1},
            {name:"3-6",times:1},
            {name:"3-5内",times:1},
            {name:"中庭前2",times:1},
            {name:"中庭前1",times:1},
            {name:"3楼电梯",times:1},
            {name:"对面",times:1},
            {name:"2-2",times:1},
            {name:"3福",times:1},
            {name:"2-3",times:1},
            {name:"2-4",times:1},
            {name:"2楼3号厕所外",times:1},
            {name:"2-6？",times:1},
            {name:"大玩家厕所对面",times:2},
            {name:"2-8",times:1},
            {name:"2-9",times:1},
            {name:"2-10",times:1},
            {name:"2楼1号厕所",times:1},
            {name:"2楼3号货梯",times:1},
            {name:"1-10",times:1},
            {name:"1-9",times:1},
            {name:"1-8",times:1},
            {name:"1-7",times:1},
            {name:"1-6",times:1},
            {name:"1-4",times:1},
            {name:"1-3",times:1},
            {name:"中庭电梯",times:1},
            {name:"1-2",times:2},
            {name:"1-1",times:1},
            {name:"1号门",times:1},
            {name:"3号门",times:1},
            {name:"kkv",times:1},
            {name:"全聚德电梯",times:1},
            {name:"沿江168-7",times:1},
            {name:"前面一个门",times:1},
            {name:"1-10",times:1}
        ];

        const totalCheckSum = rawList.reduce((sum, item) => sum + item.times, 0);
        const STORAGE_KEY = "fire_check_v7_data";
        let taskList = JSON.parse(JSON.stringify(rawList));
        let currentIdx = 0;
        let currentConfirm = 0;
        let finishTotal = 0;
        let isLocked = false;

        const finishCountEl = document.getElementById("finishCount");
        const totalCheckNumEl = document.getElementById("totalCheckNum");
        const posNameInput = document.getElementById("posNameInput");
        const saveNameBtn = document.getElementById("saveNameBtn");
        const timesTextEl = document.getElementById("timesText");
        const confirmBtn = document.getElementById("confirmBtn");
        const resetBtn = document.getElementById("resetBtn");
        const btnBox = document.getElementById("btnBox");
        const toast = document.getElementById("toast");

        function init() {
            const cache = localStorage.getItem(STORAGE_KEY);
            if(cache){
                const data = JSON.parse(cache);
                currentIdx = data.curIdx;
                currentConfirm = data.curConfirm;
                finishTotal = data.finishTotal;
                if(data.modifiedList) taskList = data.modifiedList;
            }
            render();
        }

        function saveLocal() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({
                curIdx: currentIdx,
                curConfirm: currentConfirm,
                finishTotal: finishTotal,
                modifiedList: taskList
            }));
        }

        function render() {
            totalCheckNumEl.textContent = totalCheckSum;
            finishCountEl.textContent = finishTotal;

            if(currentIdx >= taskList.length){
                posNameInput.value = "全部点位检查完毕";
                posNameInput.disabled = true;
                saveNameBtn.disabled = true;
                timesTextEl.textContent = "";
                confirmBtn.disabled = true;
                resetBtn.disabled = isLocked;
                return;
            }

            const item = taskList[currentIdx];
            posNameInput.disabled = false;
            saveNameBtn.disabled = false;
            posNameInput.value = item.name;
            timesTextEl.innerHTML = `该点位需检查：${item.times} 次｜已确认：${currentConfirm}/${item.times}`;
            confirmBtn.disabled = isLocked;
            resetBtn.disabled = isLocked;
        }

        // 弹出提示+锁定按钮1.5秒
        function showToastAndLock() {
            isLocked = true;
            toast.style.display = "block";
            render();
            setTimeout(() => {
                isLocked = false;
                toast.style.display = "none";
                render();
            }, 1500);
        }

        // 保存修改点位名称
        saveNameBtn.addEventListener("click", () => {
            const newName = posNameInput.value.trim();
            if(!newName) return;
            taskList[currentIdx].name = newName;
            saveLocal();
        });

        confirmBtn.addEventListener("click", () => {
            if (isLocked) return;

            const item = taskList[currentIdx];
            currentConfirm++;
            finishTotal++;

            if(currentConfirm >= item.times){
                currentIdx++;
                currentConfirm = 0;
            }
            saveLocal();
            render();

            btnBox.classList.toggle("swap");
            showToastAndLock();
        });

        resetBtn.addEventListener("click", () => {
            if (isLocked) return;
            currentIdx = 0;
            currentConfirm = 0;
            finishTotal = 0;
            saveLocal();
            render();
            btnBox.classList.remove("swap");
        });

        init();
    </script>
</body>
</html>
